<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Discrete Explorer Redirect</title>
    <script>
        (function () {
            var path = window.location.pathname || '/';
            var isExplorerRoute = /^\/(?:block|transaction|payment-id|address|account|account-number)\/[^/]+\/?$/.test(path) ||
                /^\/(?:charts|nodes|alt-blocks|tools|broadcast-transaction|validate-address|verify-message|amount-converter|payment-id-tools|settings)\/?$/.test(path);

            if (!isExplorerRoute) {
                return;
            }

            sessionStorage.setItem('explorer_redirect_path', path + window.location.search + window.location.hash);
            window.location.replace('/');
        })();
    </script>
</head>
<body>
    <p>Redirecting back to the Discrete explorer...</p>
</body>
</html>
